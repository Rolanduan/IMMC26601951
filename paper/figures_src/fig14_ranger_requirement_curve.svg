  <rect x="2080" y="250" width="700" height="216" rx="16" fill="#ffffff" fill-opacity="0.93" stroke="#d5dee9" stroke-width="1.8" filter="url(#cardShadow)"/><text x="2104" y="292" font-family="Times New Roman, Georgia, serif" font-size="28" font-weight="700" fill="#18324a">Curve Components</text><line x1="2104" y1="318" x2="2156" y2="318" stroke="#3b4992" stroke-width="8" /><circle cx="2130" cy="318" r="6" fill="#3b4992"/><text x="2168" y="322" font-family="Times New Roman, Georgia, serif" font-size="21" fill="#405d78">Mean protection curve</text><rect x="2104" y="344" width="24" height="18" rx="4" fill="#dfeafb" /><text x="2168" y="362" font-family="Times New Roman, Georgia, serif" font-size="21" fill="#405d78">Uncertainty band around expected PI</text><line x1="2104" y1="398" x2="2156" y2="398" stroke="#c73e1d" stroke-width="8" stroke-dasharray="14 10"/><text x="2168" y="402" font-family="Times New Roman, Georgia, serif" font-size="21" fill="#405d78">Command minimum PI = 0.70</text>
  <rect x="2080" y="540" width="700" height="220" rx="16" fill="#ffffff" fill-opacity="0.94" stroke="#d5dee9" stroke-width="1.8" filter="url(#cardShadow)"/><text x="2104" y="582" font-family="Times New Roman, Georgia, serif" font-size="28" font-weight="700" fill="#18324a">Interpretation</text><text x="2104" y="618" font-family="Times New Roman, Georgia, serif" font-size="22" fill="#405d78">The staffing-response curve is nonlinear: below the floor, every missing ranger costs disproportionately more protection.</text><text x="2104" y="649" font-family="Times New Roman, Georgia, serif" font-size="22" fill="#405d78">After the threshold, the curve flattens, so additional staff still help but no longer change feasibility as sharply.</text><text x="2104" y="680" font-family="Times New Roman, Georgia, serif" font-size="22" fill="#405d78">This gives judges a concrete, defensible staffing rule rather than only a qualitative claim.</text>
