  <rect x="54" y="196" width="3092" height="20" fill="#2f666d" opacity="0.95"/>
  
    <rect x="92" y="82" width="270" height="38" rx="10" fill="#f2ecdf" stroke="#2f666d" stroke-opacity="0.15" stroke-width="1.2"/>
    <rect x="102" y="90" width="8" height="22" rx="4" fill="#2f666d" opacity="0.84"/>
    <text x="122" y="108" font-family="Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="1.8" fill="#2f666d">WORKLOAD LOOP</text>
  
  
    <rect x="2926" y="82" width="162" height="38" rx="10" fill="#f2ecdf" stroke="#16212a" stroke-opacity="0.15" stroke-width="1.2"/>
    <rect x="2936" y="90" width="8" height="22" rx="4" fill="#16212a" opacity="0.84"/>
    <text x="2956" y="108" font-family="Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="1.8" fill="#16212a">FIG. 17</text>
  
  <text x="92" y="152" font-family="Helvetica Neue, Arial, sans-serif" font-size="58" font-weight="700" fill="#fcfaf6">Reserve Replanning and Workload Feedback</text>
  <text x="92" y="188" font-family="Helvetica Neue, Arial, sans-serif" font-size="25" fill="#d7dde0">Station load, reserve reassignment, and next-cycle updating form one service loop</text>
  <rect x="92" y="106" width="941.1200000000001" height="6" rx="3" fill="#2f666d"/><rect x="1088.48" y="106" width="442.88" height="6" rx="3" fill="#d5c8ae"/><rect x="1586.72" y="106" width="775.0400000000001" height="6" rx="3" fill="#8796a2" opacity="0.55"/><rect x="92" y="118" width="2103.68" height="2" rx="1" fill="#c5beb1"/>
  
    <rect x="58" y="256" width="3084" height="1482" rx="26" fill="#f5f0e8" stroke="#c5beb1" stroke-width="2.2" filter="url(#shadow)"/>
    <rect x="74" y="272" width="3052" height="1450" rx="18" fill="#fcfaf6" stroke="#ddd3c5" stroke-width="1.4"/>
    <rect x="86" y="284" width="22" height="1426" rx="11" fill="#16212a" opacity="0.92"/>
    <rect x="130" y="284" width="2984" height="34" rx="10" fill="#eef1ed"/>
    <line x1="150" y1="332" x2="150" y2="1710" stroke="#efe7da" stroke-width="1"/><line x1="732.8" y1="332" x2="732.8" y2="1710" stroke="#efe7da" stroke-width="1"/><line x1="1315.6" y1="332" x2="1315.6" y2="1710" stroke="#efe7da" stroke-width="1"/><line x1="1898.3999999999999" y1="332" x2="1898.3999999999999" y2="1710" stroke="#efe7da" stroke-width="1"/><line x1="2481.2" y1="332" x2="2481.2" y2="1710" stroke="#efe7da" stroke-width="1"/><line x1="3064" y1="332" x2="3064" y2="1710" stroke="#efe7da" stroke-width="1"/>
  <circle cx="1596" cy="938" r="244" fill="#f8fbfb" stroke="#c5beb1" stroke-width="2" filter="url(#shadow)"/><circle cx="1596" cy="938" r="196" fill="#eef5f5" stroke="#2f666d" stroke-width="3" opacity="0.9"/><text x="1596" y="902" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="42" font-weight="700" fill="#16212a">reserve state</text><text x="1596" y="944" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#5d6872">loss surface L_i</text><text x="1596" y="978" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#5d6872">intrusion seed p_i</text><text x="1596" y="1012" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#5d6872">service lag tau_i</text>
    <rect x="190" y="404" width="620" height="218" rx="24" fill="#ffffff" stroke="#c5beb1" stroke-width="2" filter="url(#shadow)"/>
    <rect x="190" y="404" width="620" height="12" rx="24" fill="#996351"/>
    <text x="212" y="454" font-family="Helvetica Neue, Arial, sans-serif" font-size="30" font-weight="700" fill="#16212a">1. Threat arrivals</text>
    <text x="212" y="498" font-family="Helvetica Neue, Arial, sans-serif" font-size="21" fill="#5d6872">Poisson events N_i^t with seasonal multiplier Psi_t</text><text x="212" y="530" font-family="Helvetica Neue, Arial, sans-serif" font-size="21" fill="#5d6872">High-loss cells receive both more value and more intrusion attempts</text>
  
    <rect x="920" y="330" width="620" height="218" rx="24" fill="#ffffff" stroke="#c5beb1" stroke-width="2" filter="url(#shadow)"/>
    <rect x="920" y="330" width="620" height="12" rx="24" fill="#26455d"/>
    <text x="942" y="380" font-family="Helvetica Neue, Arial, sans-serif" font-size="30" font-weight="700" fill="#16212a">2. Sensing stack</text>
    <text x="942" y="424" font-family="Helvetica Neue, Arial, sans-serif" font-size="21" fill="#5d6872">Asset-level misses are compounded into zone detection q_i^t</text><text x="942" y="456" font-family="Helvetica Neue, Arial, sans-serif" font-size="21" fill="#5d6872">Sweeps, sentinels, and reserve windows enter as one surveillance stack</text>
  
    <rect x="1660" y="330" width="620" height="218" rx="24" fill="#ffffff" stroke="#c5beb1" stroke-width="2" filter="url(#shadow)"/>
    <rect x="1660" y="330" width="620" height="12" rx="24" fill="#718ea8"/>
    <text x="1682" y="380" font-family="Helvetica Neue, Arial, sans-serif" font-size="30" font-weight="700" fill="#16212a">3. Travel and queueing</text>
    <text x="1682" y="424" font-family="Helvetica Neue, Arial, sans-serif" font-size="21" fill="#5d6872">Travel base + dispatch delay + terrain noise create tau_i^t</text><text x="1682" y="456" font-family="Helvetica Neue, Arial, sans-serif" font-size="21" fill="#5d6872">Interception g_i^t falls sharply once delay crosses the covenant threshold</text>
  
    <rect x="2390" y="404" width="620" height="218" rx="24" fill="#ffffff" stroke="#c5beb1" stroke-width="2" filter="url(#shadow)"/>
    <rect x="2390" y="404" width="620" height="12" rx="24" fill="#7e453d"/>
    <text x="2412" y="454" font-family="Helvetica Neue, Arial, sans-serif" font-size="30" font-weight="700" fill="#16212a">4. Loss accounting</text>
    <text x="2412" y="498" font-family="Helvetica Neue, Arial, sans-serif" font-size="21" fill="#5d6872">Neutralization u_i^t = q_i^t g_i^t feeds weighted loss and PI</text><text x="2412" y="530" font-family="Helvetica Neue, Arial, sans-serif" font-size="21" fill="#5d6872">The simulation measures both mean performance and tail fragility</text>
  
    <rect x="2390" y="1244" width="620" height="218" rx="24" fill="#ffffff" stroke="#c5beb1" stroke-width="2" filter="url(#shadow)"/>
    <rect x="2390" y="1244" width="620" height="12" rx="24" fill="#67586d"/>
    <text x="2412" y="1294" font-family="Helvetica Neue, Arial, sans-serif" font-size="30" font-weight="700" fill="#16212a">5. Posterior refresh</text>
    <text x="2412" y="1338" font-family="Helvetica Neue, Arial, sans-serif" font-size="21" fill="#5d6872">Sweep pressure refreshes C_i and re-estimates the intrusion prior</text><text x="2412" y="1370" font-family="Helvetica Neue, Arial, sans-serif" font-size="21" fill="#5d6872">Yesterday's deployment changes tomorrow's loss surface</text>
  
    <rect x="1660" y="1320" width="620" height="218" rx="24" fill="#ffffff" stroke="#c5beb1" stroke-width="2" filter="url(#shadow)"/>
    <rect x="1660" y="1320" width="620" height="12" rx="24" fill="#a9782e"/>
    <text x="1682" y="1370" font-family="Helvetica Neue, Arial, sans-serif" font-size="30" font-weight="700" fill="#16212a">6. Barrier rerun</text>
    <text x="1682" y="1414" font-family="Helvetica Neue, Arial, sans-serif" font-size="21" fill="#5d6872">If PI or hinge service falls below threshold, the solver reruns</text><text x="1682" y="1446" font-family="Helvetica Neue, Arial, sans-serif" font-size="21" fill="#5d6872">The next tasking plan is generated from the updated state</text>
  
    <rect x="920" y="1320" width="620" height="218" rx="24" fill="#ffffff" stroke="#c5beb1" stroke-width="2" filter="url(#shadow)"/>
    <rect x="920" y="1320" width="620" height="12" rx="24" fill="#4f6961"/>
    <text x="942" y="1370" font-family="Helvetica Neue, Arial, sans-serif" font-size="30" font-weight="700" fill="#16212a">7. Asset reset</text>
    <text x="942" y="1414" font-family="Helvetica Neue, Arial, sans-serif" font-size="21" fill="#5d6872">Paths, sentinels, and reserve windows are reassigned for the next cycle</text><text x="942" y="1446" font-family="Helvetica Neue, Arial, sans-serif" font-size="21" fill="#5d6872">The loop preserves adaptation instead of static sweep plans</text>
  
    <rect x="190" y="1244" width="620" height="218" rx="24" fill="#ffffff" stroke="#c5beb1" stroke-width="2" filter="url(#shadow)"/>
    <rect x="190" y="1244" width="620" height="12" rx="24" fill="#2f666d"/>
    <text x="212" y="1294" font-family="Helvetica Neue, Arial, sans-serif" font-size="30" font-weight="700" fill="#16212a">8. Audit trail</text>
    <text x="212" y="1338" font-family="Helvetica Neue, Arial, sans-serif" font-size="21" fill="#5d6872">Observed detections, delays, and hinge compliance feed governance</text><text x="212" y="1370" font-family="Helvetica Neue, Arial, sans-serif" font-size="21" fill="#5d6872">The loop remains auditable at weekly and monthly review scales</text>
  <path d="M 810 514 C 964 440, 1048 424, 920 440" fill="none" stroke="#996351" stroke-width="6" stroke-linecap="round"/><path d="M 920 440 L 936.9927586387215 446.94594513699565 L 934.7601334161158 429.08494335614967 Z" fill="#996351"/><path d="M 1540 440 C 1602 350, 1708 350, 1660 440" fill="none" stroke="#26455d" stroke-width="6" stroke-linecap="round"/><path d="M 1660 440 L 1675.4705882352941 430.11764705882354 L 1659.5882352941176 421.6470588235294 Z" fill="#26455d"/><path d="M 2280 440 C 2390 420, 2448 452, 2390 514" fill="none" stroke="#718ea8" stroke-width="6" stroke-linecap="round"/><path d="M 2390 514 L 2407.502956782082 508.46407154267933 L 2394.358071338742 496.167243224716 Z" fill="#718ea8"/><path d="M 2700 622 C 2860 744, 2860 1080, 2700 1244" fill="none" stroke="#7e453d" stroke-width="6" stroke-linecap="round"/><path d="M 2700 1244 L 2717.6152191686 1238.8324034946424 L 2704.7311440978106 1226.2625741572867 Z" fill="#7e453d"/><path d="M 2390 1352 C 2326 1446, 2184 1480, 2280 1428" fill="none" stroke="#67586d" stroke-width="6" stroke-linecap="round"/><path d="M 2280 1428 L 2261.6447801985446 1427.706902677821 L 2270.2178768722783 1443.5341580754832 Z" fill="#67586d"/><path d="M 1660 1428 C 1546 1490, 1126 1490, 920 1428" fill="none" stroke="#a9782e" stroke-width="6" stroke-linecap="round"/><path d="M 920 1428 L 932.7273142867689 1441.2293412929673 L 937.9149266841516 1423.9930807468243 Z" fill="#a9782e"/><path d="M 920 1428 C 742 1458, 566 1418, 810 1352" fill="none" stroke="#4f6961" stroke-width="6" stroke-linecap="round"/><path d="M 810 1352 L 792.2050730465068 1347.489947370613 L 796.9050226287098 1364.8655185533037 Z" fill="#4f6961"/><path d="M 190 1244 C 126 1090, 124 714, 190 622" fill="none" stroke="#2f666d" stroke-width="6" stroke-linecap="round"/><path d="M 190 622 L 173.36062973710514 629.7544411310093 L 187.98631824843946 640.2467828891406 Z" fill="#2f666d"/><rect x="1208" y="1124" width="776" height="58" rx="29" fill="#edf3f0" stroke="#c5beb1" stroke-width="1.5"/><text x="1596" y="1161" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" font-weight="700" fill="#16212a">The simulation is not a terminal check. It is the state-transition mechanism that rewrites the next plan.</text>
</svg>