    <text x="216" y="106" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="19" font-weight="700" letter-spacing="2" fill="#fbf8f1">TRANSFER WHEEL</text>
  
  
    <rect x="2914" y="78" width="174" height="42" rx="21" fill="#efe5cb" stroke="#efe5cb" stroke-width="1.2"/>
    <text x="3001" y="106" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="19" font-weight="700" letter-spacing="2" fill="#20303d">FIG. 11</text>
  
  <text x="92" y="152" font-family="Helvetica Neue, Arial, sans-serif" font-size="60" font-weight="700" fill="#20303d">Transferability Wheel</text>
  <text x="92" y="189" font-family="Helvetica Neue, Arial, sans-serif" font-size="26" fill="#687682">Portable core modules, local retuning, and park-specific priors are organized as a concentric deployment wheel</text>
  <rect x="92" y="98" width="2768" height="7" rx="4" fill="#7a6887"/><rect x="92" y="108" width="1826.88" height="2" rx="1" fill="#bcc4c5"/>
  
