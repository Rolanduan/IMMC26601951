    <text x="2282" y="782" font-family="Helvetica Neue, Arial, sans-serif" font-size="34" font-weight="700" fill="#16212a">Why a wheel</text>
    <text x="2282" y="826" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" fill="#5d6872">Transferability is radial rather than tabular because every module depends on the same core architecture at the center.</text><text x="2282" y="860" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" fill="#5d6872">The figure therefore avoids looking like a generic policy matrix.</text>
  
