    <text x="2488" y="1040" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="19" font-weight="700" letter-spacing="2" fill="#20303d">retune</text>
  
    <rect x="2590" y="1012" width="170" height="42" rx="21" fill="#f0ddd8" stroke="#f0ddd8" stroke-width="1.2"/>
    <text x="2675" y="1040" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="19" font-weight="700" letter-spacing="2" fill="#20303d">rebuild</text>
  
