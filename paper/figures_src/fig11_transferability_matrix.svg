    <text x="2282" y="518" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" fill="#5d6872">Inner ring - transfers directly with the same mathematical structure.</text><text x="2282" y="552" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" fill="#5d6872">Middle ring - same structure, but local calibration is needed.</text><text x="2282" y="586" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" fill="#5d6872">Outer ring - reserve-specific priors must be rebuilt.</text>
  
