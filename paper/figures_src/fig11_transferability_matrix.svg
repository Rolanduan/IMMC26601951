    <rect x="74" y="272" width="3052" height="1450" rx="28" fill="#f8f3ea" stroke="#dad3c4" stroke-width="1.5"/>
  <circle cx="1370" cy="1010" r="520" fill="#f7f1e7" stroke="#bcc4c5" stroke-width="2" filter="url(#shadow)"/><circle cx="1370" cy="1010" r="520" fill="none" stroke="#8f4637" stroke-width="36" opacity="0.16"/><circle cx="1370" cy="1010" r="365" fill="none" stroke="#b89443" stroke-width="36" opacity="0.18"/><circle cx="1370" cy="1010" r="210" fill="none" stroke="#6d8368" stroke-width="36" opacity="0.22"/><circle cx="1370" cy="1010" r="124" fill="#ffffff" stroke="#bcc4c5" stroke-width="2"/><text x="1370" y="1000" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="36" font-weight="700" fill="#20303d">portable core</text><text x="1370" y="1038" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#687682">same architecture across parks</text><line x1="1370" y1="1010" x2="1160" y2="1010" stroke="#6d8368" stroke-width="6" stroke-linecap="round"/><circle cx="1160" cy="1010" r="16" fill="#6d8368" stroke="#fbf8f1" stroke-width="4"/><text x="760" y="1017.9999999999999" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="27" font-weight="700" fill="#20303d">Zoning</text><text x="760" y="1050" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="21" fill="#687682">Direct</text><line x1="1370" y1="1010" x2="1265" y2="828.1346652052679" stroke="#6d8368" stroke-width="6" stroke-linecap="round"/><circle cx="1265" cy="828.1346652052679" r="16" fill="#6d8368" stroke="#fbf8f1" stroke-width="4"/><text x="1065" y="489.7245036914924" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="27" font-weight="700" fill="#20303d">Risk logic</text><text x="1065" y="521.7245036914924" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="21" fill="#687682">Direct</text><line x1="1370" y1="1010" x2="1475" y2="828.1346652052679" stroke="#6d8368" stroke-width="6" stroke-linecap="round"/><circle cx="1475" cy="828.1346652052679" r="16" fill="#6d8368" stroke="#fbf8f1" stroke-width="4"/><text x="1675" y="489.7245036914925" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="27" font-weight="700" fill="#20303d">Allocation</text><text x="1675" y="521.7245036914925" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="21" fill="#687682">Direct</text><line x1="1370" y1="1010" x2="1580" y2="1010" stroke="#6d8368" stroke-width="6" stroke-linecap="round"/><circle cx="1580" cy="1010" r="16" fill="#6d8368" stroke="#fbf8f1" stroke-width="4"/><text x="1980" y="1018" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="27" font-weight="700" fill="#20303d">Simulation</text><text x="1980" y="1050" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="21" fill="#687682">Direct</text><line x1="1370" y1="1010" x2="1547" y2="1316.5729929396912" stroke="#b89443" stroke-width="6" stroke-linecap="round"/><circle cx="1547" cy="1316.5729929396912" r="16" fill="#b89443" stroke="#fbf8f1" stroke-width="4"/><text x="1675" y="1546.2754963085076" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="27" font-weight="700" fill="#20303d">Ecology layer</text><text x="1675" y="1578.2754963085076" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="21" fill="#687682">Retune</text><line x1="1370" y1="1010" x2="1116" y2="1449.9409051224948" stroke="#8f4637" stroke-width="6" stroke-linecap="round"/><circle cx="1116" cy="1449.9409051224948" r="16" fill="#8f4637" stroke="#fbf8f1" stroke-width="4"/><text x="1065" y="1546.2754963085076" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="27" font-weight="700" fill="#20303d">Threat prior</text><text x="1065" y="1578.2754963085076" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="21" fill="#687682">Rebuild</text>
    <rect x="2230" y="420" width="700" height="244" rx="24" fill="#ffffff" stroke="#bcc4c5" stroke-width="2" filter="url(#shadow)"/>
    <rect x="2230" y="420" width="700" height="12" rx="24" fill="#7a6887" opacity="0.92"/>
    <text x="2256" y="478" font-family="Helvetica Neue, Arial, sans-serif" font-size="34" font-weight="700" fill="#20303d">Ring meaning</text>
    <text x="2256" y="526" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" fill="#687682">Inner ring - transfers directly with the same mathematical structure.</text><text x="2256" y="560" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" fill="#687682">Middle ring - same structure, but local calibration is needed.</text><text x="2256" y="594" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" fill="#687682">Outer ring - reserve-specific priors must be rebuilt.</text>
  
    <rect x="2230" y="728" width="700" height="210" rx="24" fill="#ffffff" stroke="#bcc4c5" stroke-width="2" filter="url(#shadow)"/>
    <rect x="2230" y="728" width="700" height="12" rx="24" fill="#405b74" opacity="0.92"/>
    <text x="2256" y="786" font-family="Helvetica Neue, Arial, sans-serif" font-size="34" font-weight="700" fill="#20303d">Why a wheel</text>
    <text x="2256" y="834" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" fill="#687682">Transferability is radial rather than tabular because every module depends on the same core architecture at the center.</text><text x="2256" y="868" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" fill="#687682">The figure therefore avoids looking like a generic policy matrix.</text>
  
    <rect x="2248" y="1012" width="142" height="42" rx="21" fill="#dce8d7" stroke="#dce8d7" stroke-width="1.2"/>
