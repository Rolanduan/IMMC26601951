  <rect x="1755" y="250" width="960" height="222" rx="16" fill="#ffffff" fill-opacity="0.93" stroke="#d5dee9" stroke-width="1.8" filter="url(#cardShadow)"/><text x="1779" y="292" font-family="Times New Roman, Georgia, serif" font-size="28" font-weight="700" fill="#18324a">Parameter Leverage</text><rect x="1779" y="304" width="24" height="18" rx="4" fill="#c73e1d" /><text x="1843" y="322" font-family="Times New Roman, Georgia, serif" font-size="21" fill="#405d78">Loss when parameter weakens</text><rect x="1779" y="346" width="24" height="18" rx="4" fill="#008b45" /><text x="1843" y="364" font-family="Times New Roman, Georgia, serif" font-size="21" fill="#405d78">Gain when parameter improves</text><line x1="1779" y1="402" x2="1831" y2="402" stroke="#64798e" stroke-width="8" /><text x="1843" y="406" font-family="Times New Roman, Georgia, serif" font-size="21" fill="#405d78">Baseline reference (dPI = 0)</text>
  <rect x="1755" y="520" width="960" height="242" rx="16" fill="#ffffff" fill-opacity="0.94" stroke="#d5dee9" stroke-width="1.8" filter="url(#cardShadow)"/><text x="1779" y="562" font-family="Times New Roman, Georgia, serif" font-size="28" font-weight="700" fill="#18324a">Interpretation</text><text x="1779" y="598" font-family="Times New Roman, Georgia, serif" font-size="22" fill="#405d78">Staffing is the dominant lever: its downside exposure is larger than any other modeled perturbation.</text><text x="1779" y="629" font-family="Times New Roman, Georgia, serif" font-size="22" fill="#405d78">Base detection quality is the second critical control, validating investment in sensing and screening.</text><text x="1779" y="660" font-family="Times New Roman, Georgia, serif" font-size="22" fill="#405d78">Route cadence and device count still matter, but they act as supporting amplifiers rather than the primary lever.</text>
