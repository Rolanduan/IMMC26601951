    <text x="174" y="1094" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#5d6872">Inputs: ranger-hours H_R, sentinel stock M, reserve sorties U</text><text x="174" y="1128" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#5d6872">Objects: station caps kappa_s, hinge floor q_bar</text>
