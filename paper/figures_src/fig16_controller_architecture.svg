    <text x="174" y="478" font-family="Helvetica Neue, Arial, sans-serif" font-size="32" font-weight="700" fill="#16212a">Hinge-loss surface</text>
    <text x="174" y="526" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#5d6872">Inputs: zone morphology, priors, and service drag</text><text x="174" y="560" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#5d6872">Objects: L_i, hinge belt, and slack exposure map</text>
