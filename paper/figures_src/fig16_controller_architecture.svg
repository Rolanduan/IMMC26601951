    <text x="2296" y="816" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#5d6872">Fixed sentinels pinned to stable hinge cells</text><text x="2296" y="850" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#5d6872">Continuous watching where recurrence matters most</text>
