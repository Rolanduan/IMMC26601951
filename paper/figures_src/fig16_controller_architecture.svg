    <text x="1168" y="1112" font-family="Helvetica Neue, Arial, sans-serif" font-size="32" font-weight="700" fill="#16212a">Marginal equalization rule</text>
    <text x="1168" y="1160" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#5d6872">The solver concentrates effort until active cells satisfy</text><text x="1168" y="1194" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#5d6872">approximately equal weighted marginal debt reduction</text><text x="1168" y="1228" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#5d6872">L_i exp(-eta_i) across the defended hinge belt</text>
    <rect x="1166" y="1324" width="868" height="30" rx="15" fill="#67586d" opacity="0.16"/><text x="1178" y="1345" font-family="Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="700" fill="#67586d">why sealing beats flat spreading</text>
  
