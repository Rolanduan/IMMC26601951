  <rect x="54" y="48" width="3092" height="162" rx="32" fill="#f7f9f6" stroke="#bcc8c3" stroke-width="2.2" filter="url(#shadow)"/>
  
    <rect x="92" y="78" width="248" height="42" rx="21" fill="#35556c" stroke="#35556c" stroke-width="1.2"/>
    <text x="216" y="106" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="19" font-weight="700" letter-spacing="2" fill="#f7f9f6">ALGORITHM STACK</text>
  
  
    <rect x="2914" y="78" width="174" height="42" rx="21" fill="#efe5cb" stroke="#efe5cb" stroke-width="1.2"/>
    <text x="3001" y="106" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="19" font-weight="700" letter-spacing="2" fill="#1f2d36">FIG. 16</text>
  
  <text x="92" y="152" font-family="Helvetica Neue, Arial, sans-serif" font-size="60" font-weight="700" fill="#1f2d36">Controller Architecture and Constraint Stack</text>
  <text x="92" y="189" font-family="Helvetica Neue, Arial, sans-serif" font-size="26" fill="#60717d">The allocation engine is decomposed into inputs, guard rails, optimization core, and deployable outputs</text>
  <rect x="92" y="98" width="2768" height="7" rx="4" fill="#35556c"/><rect x="92" y="108" width="1826.88" height="2" rx="1" fill="#bcc8c3"/>
  
    <rect x="58" y="256" width="3084" height="1482" rx="34" fill="#f7f9f6" stroke="#bcc8c3" stroke-width="2.3" filter="url(#shadow)"/>
    <rect x="74" y="272" width="3052" height="1450" rx="28" fill="#f8f3ea" stroke="#dad3c4" stroke-width="1.5"/>
  <rect x="118" y="320" width="840" height="1180" rx="28" fill="#f8fbfb" stroke="#bcc8c3" stroke-width="2"/><rect x="1110" y="320" width="980" height="1180" rx="28" fill="#fbfaf7" stroke="#bcc8c3" stroke-width="2"/><rect x="2238" y="320" width="844" height="1180" rx="28" fill="#f9f7f4" stroke="#bcc8c3" stroke-width="2"/><text x="150" y="378" font-family="Helvetica Neue, Arial, sans-serif" font-size="30" font-weight="700" fill="#1f2d36">Input stack</text><text x="1144" y="378" font-family="Helvetica Neue, Arial, sans-serif" font-size="30" font-weight="700" fill="#1f2d36">Optimization core</text><text x="2272" y="378" font-family="Helvetica Neue, Arial, sans-serif" font-size="30" font-weight="700" fill="#1f2d36">Deployable outputs</text>
    <rect x="150" y="424" width="774" height="228" rx="26" fill="#ffffff" stroke="#bcc8c3" stroke-width="2" filter="url(#shadow)"/>
    <rect x="150" y="424" width="774" height="12" rx="26" fill="#567568"/>
    <text x="174" y="478" font-family="Helvetica Neue, Arial, sans-serif" font-size="32" font-weight="700" fill="#1f2d36">Priority field</text>
    <text x="174" y="526" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#60717d">Inputs: zone features, priors, and response friction</text><text x="174" y="560" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#60717d">Objects: R_i, hotspot quartile, service deficit map</text>
    <rect x="172" y="598" width="730" height="30" rx="15" fill="#567568" opacity="0.16"/><text x="184" y="619" font-family="Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="700" fill="#567568">state estimate</text>
  
    <rect x="150" y="708" width="774" height="228" rx="26" fill="#ffffff" stroke="#bcc8c3" stroke-width="2" filter="url(#shadow)"/>
    <rect x="150" y="708" width="774" height="12" rx="26" fill="#bc8531"/>
    <text x="174" y="762" font-family="Helvetica Neue, Arial, sans-serif" font-size="32" font-weight="700" fill="#1f2d36">Feasible route library</text>
    <text x="174" y="810" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#60717d">Inputs: stations, roads, travel times, shift cap</text><text x="174" y="844" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#60717d">Objects: route set R, coverage matrix a_ir, sector matrix b_ij</text>
    <rect x="172" y="882" width="730" height="30" rx="15" fill="#bc8531" opacity="0.16"/><text x="184" y="903" font-family="Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="700" fill="#bc8531">mobility envelope</text>
  
    <rect x="150" y="992" width="774" height="228" rx="26" fill="#ffffff" stroke="#bcc8c3" stroke-width="2" filter="url(#shadow)"/>
    <rect x="150" y="992" width="774" height="12" rx="26" fill="#a35d43"/>
    <text x="174" y="1046" font-family="Helvetica Neue, Arial, sans-serif" font-size="32" font-weight="700" fill="#1f2d36">Resource budgets</text>
    <text x="174" y="1094" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#60717d">Inputs: ranger-hours H_R, device stock M, UAV sorties U</text><text x="174" y="1128" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#60717d">Objects: station caps kappa_s, hotspot floor q_bar</text>
    <rect x="172" y="1166" width="730" height="30" rx="15" fill="#a35d43" opacity="0.16"/><text x="184" y="1187" font-family="Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="700" fill="#a35d43">capacity guard</text>
  
    <rect x="1144" y="446" width="912" height="290" rx="26" fill="#ffffff" stroke="#bcc8c3" stroke-width="2" filter="url(#shadow)"/>
    <rect x="1144" y="446" width="912" height="12" rx="26" fill="#35556c"/>
    <text x="1168" y="500" font-family="Helvetica Neue, Arial, sans-serif" font-size="32" font-weight="700" fill="#1f2d36">MILP controller</text>
    <text x="1168" y="548" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#60717d">Objective: maximize weighted protection minus route burden</text><text x="1168" y="582" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#60717d">Surrogate: linearized utility e_i replacing concave E_i</text><text x="1168" y="616" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#60717d">Decision variables: patrol loops x_r, fixed watch y_i, UAV sorties z_j</text>
    <rect x="1166" y="682" width="868" height="30" rx="15" fill="#35556c" opacity="0.16"/><text x="1178" y="703" font-family="Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="700" fill="#35556c">solve for weekly tasking package</text>
  
    <rect x="1144" y="794" width="432" height="204" rx="26" fill="#ffffff" stroke="#bcc8c3" stroke-width="2" filter="url(#shadow)"/>
    <rect x="1144" y="794" width="432" height="12" rx="26" fill="#8c4338"/>
    <text x="1168" y="848" font-family="Helvetica Neue, Arial, sans-serif" font-size="32" font-weight="700" fill="#1f2d36">Constraint rail A</text>
    <text x="1168" y="896" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#60717d">Ranger-hour cap</text><text x="1168" y="930" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#60717d">Station activation cap</text>
    <rect x="1166" y="944" width="388" height="30" rx="15" fill="#8c4338" opacity="0.16"/><text x="1178" y="965" font-family="Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="700" fill="#8c4338">feasibility</text>
  
    <rect x="1624" y="794" width="432" height="204" rx="26" fill="#ffffff" stroke="#bcc8c3" stroke-width="2" filter="url(#shadow)"/>
    <rect x="1624" y="794" width="432" height="12" rx="26" fill="#2f6d75"/>
    <text x="1648" y="848" font-family="Helvetica Neue, Arial, sans-serif" font-size="32" font-weight="700" fill="#1f2d36">Constraint rail B</text>
    <text x="1648" y="896" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#60717d">Device and UAV inventories</text><text x="1648" y="930" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#60717d">Hotspot service floor</text>
    <rect x="1646" y="944" width="388" height="30" rx="15" fill="#2f6d75" opacity="0.16"/><text x="1658" y="965" font-family="Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="700" fill="#2f6d75">coverage discipline</text>
  
    <rect x="1144" y="1058" width="912" height="320" rx="26" fill="#ffffff" stroke="#bcc8c3" stroke-width="2" filter="url(#shadow)"/>
    <rect x="1144" y="1058" width="912" height="12" rx="26" fill="#6d617e"/>
    <text x="1168" y="1112" font-family="Helvetica Neue, Arial, sans-serif" font-size="32" font-weight="700" fill="#1f2d36">Marginal-gain logic</text>
    <text x="1168" y="1160" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#60717d">The controller concentrates effort until active cells satisfy</text><text x="1168" y="1194" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#60717d">approximately equal weighted marginal value</text><text x="1168" y="1228" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#60717d">R_i exp(-eta_i) across the protected corridor</text>
    <rect x="1166" y="1324" width="868" height="30" rx="15" fill="#6d617e" opacity="0.16"/><text x="1178" y="1345" font-family="Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="700" fill="#6d617e">why concentration beats uniform spread</text>
  
    <rect x="2272" y="446" width="776" height="212" rx="26" fill="#ffffff" stroke="#bcc8c3" stroke-width="2" filter="url(#shadow)"/>
    <rect x="2272" y="446" width="776" height="12" rx="26" fill="#35556c"/>
    <text x="2296" y="500" font-family="Helvetica Neue, Arial, sans-serif" font-size="32" font-weight="700" fill="#1f2d36">Patrol package</text>
    <text x="2296" y="548" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#60717d">Route activations by station and daily cadence</text><text x="2296" y="582" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#60717d">Backbone of the corridor-defense plan</text>
    <rect x="2294" y="604" width="732" height="30" rx="15" fill="#35556c" opacity="0.16"/><text x="2306" y="625" font-family="Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="700" fill="#35556c">x_r</text>
  
    <rect x="2272" y="714" width="776" height="212" rx="26" fill="#ffffff" stroke="#bcc8c3" stroke-width="2" filter="url(#shadow)"/>
    <rect x="2272" y="714" width="776" height="12" rx="26" fill="#2f6d75"/>
    <text x="2296" y="768" font-family="Helvetica Neue, Arial, sans-serif" font-size="32" font-weight="700" fill="#1f2d36">Persistent watch layer</text>
    <text x="2296" y="816" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#60717d">Fixed devices pinned to stable hotspot cells</text><text x="2296" y="850" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#60717d">Continuous monitoring where recurrence matters most</text>
    <rect x="2294" y="872" width="732" height="30" rx="15" fill="#2f6d75" opacity="0.16"/><text x="2306" y="893" font-family="Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="700" fill="#2f6d75">y_i</text>
  
    <rect x="2272" y="982" width="776" height="212" rx="26" fill="#ffffff" stroke="#bcc8c3" stroke-width="2" filter="url(#shadow)"/>
    <rect x="2272" y="982" width="776" height="12" rx="26" fill="#bc8531"/>
    <text x="2296" y="1036" font-family="Helvetica Neue, Arial, sans-serif" font-size="32" font-weight="700" fill="#1f2d36">Adaptive surge layer</text>
    <text x="2296" y="1084" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#60717d">UAV windows assigned to uncertain or shifting sectors</text><text x="2296" y="1118" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#60717d">Flexible observation over hotspot edges and gaps</text>
    <rect x="2294" y="1140" width="732" height="30" rx="15" fill="#bc8531" opacity="0.16"/><text x="2306" y="1161" font-family="Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="700" fill="#bc8531">z_j</text>
  
    <rect x="2272" y="1250" width="776" height="180" rx="26" fill="#ffffff" stroke="#bcc8c3" stroke-width="2" filter="url(#shadow)"/>
    <rect x="2272" y="1250" width="776" height="12" rx="26" fill="#567568"/>
    <text x="2296" y="1304" font-family="Helvetica Neue, Arial, sans-serif" font-size="32" font-weight="700" fill="#1f2d36">Management products</text>
    <text x="2296" y="1352" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#60717d">Weekly tasking sheet, staffing check, and hotspot compliance report</text>
    <rect x="2294" y="1376" width="732" height="30" rx="15" fill="#567568" opacity="0.16"/><text x="2306" y="1397" font-family="Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="700" fill="#567568">field-ready output</text>
