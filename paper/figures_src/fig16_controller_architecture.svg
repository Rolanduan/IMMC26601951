    <text x="2296" y="1084" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#5d6872">Reserve windows assigned to uncertain or shifting sectors</text><text x="2296" y="1118" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#5d6872">Flexible observation over hinge edges and service gaps</text>
