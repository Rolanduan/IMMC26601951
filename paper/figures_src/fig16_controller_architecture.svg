    <text x="1168" y="500" font-family="Helvetica Neue, Arial, sans-serif" font-size="32" font-weight="700" fill="#16212a">Lexicographic barrier solver</text>
    <text x="1168" y="548" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#5d6872">Stage 1: cap the worst hinge debt before any averaging begins</text><text x="1168" y="582" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#5d6872">Stage 2: reduce total residual debt under the same field limits</text><text x="1168" y="616" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#5d6872">Decision variables: sweep paths x_p, sentinels y_i, reserve windows z_j</text>
