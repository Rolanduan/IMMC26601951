ke-linecap="round"/><path d="M 2272 820 L 2254.0358391110785 816.2199307470706 L 2259.4409848652676 833.3892172603761 Z" fill="#2f6d75"/><rect x="2068" y="826" width="192" height="34" rx="17" fill="#f7f9f6" stroke="#bcc8c3" stroke-width="1.2"/><text x="2164" y="849" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="700" fill="#1f2d36">sensor siting</text><line x1="2056" y1="1170" x2="2272" y2="1088" stroke="#bc8531" stroke-width="6" stroke-linecap="round"/><path d="M 2272 1088 L 2253.8473873141884 1085.2645562190191 L 2260.2358604482506 1102.0927293526474 Z" fill="#bc8531"/><rect x="2068" y="1101" width="192" height="34" rx="17" fill="#f7f9f6" stroke="#bcc8c3" stroke-width="1.2"/><text x="2164" y="1124" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="700" fill="#1f2d36">UAV sectors</text><rect x="1232" y="1406" width="736" height="42" rx="21" fill="#e6ecef"/><text x="1600" y="1434" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="700" fill="#1f2d36">The controller is only allowed to emit plans that are simultaneously high-value and field-feasible.</text>
