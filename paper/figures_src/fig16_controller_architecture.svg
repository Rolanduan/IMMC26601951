    <text x="174" y="762" font-family="Helvetica Neue, Arial, sans-serif" font-size="32" font-weight="700" fill="#16212a">Path dictionary</text>
    <text x="174" y="810" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#5d6872">Inputs: stations, roads, travel times, shift cap</text><text x="174" y="844" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#5d6872">Objects: path set P, coverage matrix a_ip, sector matrix b_ij</text>
