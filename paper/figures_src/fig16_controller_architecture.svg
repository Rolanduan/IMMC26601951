    <text x="2296" y="548" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#5d6872">Path activations by station and daily cadence</text><text x="2296" y="582" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#5d6872">Backbone of the hinge-sealing plan</text>
