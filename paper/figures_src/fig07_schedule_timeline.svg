    <text x="1210" y="958" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="40" font-weight="700" fill="#20303d">daily command cycle</text>
    <text x="1210" y="998" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#687682">outer ring patrol waves - middle ring sensors - inner gold drone windows</text>
    
