  <text x="92" y="152" font-family="Helvetica Neue, Arial, sans-serif" font-size="60" font-weight="700" fill="#20303d">Twenty-Four-Hour Operational Dial</text>
  <text x="92" y="189" font-family="Helvetica Neue, Arial, sans-serif" font-size="26" fill="#687682">The daily plan is expressed as a duty cycle with recurring patrol waves, sensor watch, and drone windows</text>
