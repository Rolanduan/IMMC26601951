    <text x="2072" y="444" font-family="Helvetica Neue, Arial, sans-serif" font-size="34" font-weight="700" fill="#16212a">Clock logic</text>
    <text x="2072" y="488" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#5d6872">05:00-08:00 hinge sweep departure</text><text x="2072" y="522" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#5d6872">09:00-11:00 sentinel review and watch confirmation</text><text x="2072" y="556" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#5d6872">11:00-13:00 first reserve window</text><text x="2072" y="590" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#5d6872">14:00-18:00 southern and western seal rotation</text><text x="2072" y="624" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#5d6872">19:00-21:00 second reserve window and exception handling</text><text x="2072" y="658" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#5d6872">late hours held as standby or surge bridge</text>
  
    
    <rect x="2020" y="736" width="930" height="222" rx="18" fill="#ffffff" stroke="#c5beb1" stroke-width="1.9" filter="url(#shadow)"/>
    <rect x="2036" y="752" width="10" height="190" rx="5" fill="#a9782e" opacity="0.9"/>
    <rect x="2060" y="754" width="440" height="30" rx="8" fill="#a9782e" fill-opacity="0.12"/>
    <text x="2072" y="790" font-family="Helvetica Neue, Arial, sans-serif" font-size="34" font-weight="700" fill="#16212a">Why a clock instead of a line</text>
    <text x="2072" y="834" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#5d6872">This plate emphasizes recurrence and overlap across the full day, which is the queueing issue the model cares about.</text><text x="2072" y="868" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#5d6872">A straight timeline hides how sweep bands and reserve windows wrap into the next day.</text>
  
    
