    <text x="1210" y="958" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="40" font-weight="700" fill="#16212a">daily sortie clock</text>
    <text x="1210" y="998" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#5d6872">outer ring sweep bands - middle ring watch dwell - inner gold reserve windows</text>
    
