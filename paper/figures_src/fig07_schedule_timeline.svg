    <rect x="2020" y="390" width="930" height="12" rx="24" fill="#4f7d78" opacity="0.92"/>
    <text x="2046" y="448" font-family="Helvetica Neue, Arial, sans-serif" font-size="34" font-weight="700" fill="#20303d">Cycle logic</text>
    <text x="2046" y="496" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#687682">05:00-08:00 east loop deployment</text><text x="2046" y="530" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#687682">09:00-11:00 sensor watch and report review</text><text x="2046" y="564" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#687682">11:00-13:00 first UAV window</text><text x="2046" y="598" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#687682">14:00-18:00 south and west patrol rotation</text><text x="2046" y="632" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#687682">19:00-21:00 second UAV window and exception handling</text><text x="2046" y="666" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#687682">late hours kept as reserve or rapid response</text>
  
    
    <rect x="2020" y="736" width="930" height="222" rx="24" fill="#ffffff" stroke="#bcc4c5" stroke-width="2" filter="url(#shadow)"/>
    <rect x="2020" y="736" width="930" height="12" rx="24" fill="#b89443" opacity="0.92"/>
    <text x="2046" y="794" font-family="Helvetica Neue, Arial, sans-serif" font-size="34" font-weight="700" fill="#20303d">Why a dial instead of a line</text>
    <text x="2046" y="842" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#687682">This figure emphasizes recurrence and overlap across the full day, which is the operational issue the simulation cares about.</text><text x="2046" y="876" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#687682">A straight timeline hides how patrol waves and drone windows wrap into the next day.</text>
  
    
