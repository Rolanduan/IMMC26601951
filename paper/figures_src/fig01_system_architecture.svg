    <rect x="1140" y="1098" width="244" height="30" rx="8" fill="#a9782e" fill-opacity="0.12"/>
    <text x="1152" y="1134" font-family="Helvetica Neue, Arial, sans-serif" font-size="34" font-weight="700" fill="#16212a">Command outputs</text>
    <text x="1152" y="1178" font-family="Helvetica Neue, Arial, sans-serif" font-size="28" fill="#5d6872">atlas plate</text><text x="1152" y="1212" font-family="Helvetica Neue, Arial, sans-serif" font-size="28" fill="#5d6872">barrier deck</text><text x="1152" y="1246" font-family="Helvetica Neue, Arial, sans-serif" font-size="28" fill="#5d6872">service clock</text><text x="1152" y="1280" font-family="Helvetica Neue, Arial, sans-serif" font-size="28" fill="#5d6872">staffing floor</text><text x="1152" y="1314" font-family="Helvetica Neue, Arial, sans-serif" font-size="28" fill="#5d6872">transfer covenant</text>
  
    <rect x="2020" y="1080" width="980" height="228" rx="18" fill="#ffffff" stroke="#c5beb1" stroke-width="1.9" filter="url(#shadow)"/>
    <rect x="2036" y="1096" width="10" height="196" rx="5" fill="#67586d" opacity="0.9"/>
    <rect x="2060" y="1098" width="454" height="30" rx="8" fill="#67586d" fill-opacity="0.12"/>
    <text x="2072" y="1134" font-family="Helvetica Neue, Arial, sans-serif" font-size="34" font-weight="700" fill="#16212a">Why this plate looks different</text>
    <text x="2072" y="1178" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" fill="#5d6872">The workflow mirrors this manuscript's loss-flow derivation rather than borrowing a generic dashboard grammar.</text><text x="2072" y="1212" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" fill="#5d6872">Every stage emits both a modeling object and a field packet, so the figure reads as an operating plate instead of a brochure.</text>
  
    <rect x="206" y="1360" width="440" height="118" rx="16" fill="#ffffff" stroke="#c5beb1" stroke-width="1.8"/>
    <rect x="222" y="1374" width="9" height="90" rx="4.5" fill="#26455d"/>
    <text x="246" y="1404" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" fill="#5d6872">planning rhythm</text>
    <text x="246" y="1446" font-family="Helvetica Neue, Arial, sans-serif" font-size="42" font-weight="700" fill="#16212a">7-day cycle</text>
    <text x="624" y="1446" text-anchor="end" font-family="Helvetica Neue, Arial, sans-serif" font-size="22" fill="#5d6872">atlas + tasking</text>
  
