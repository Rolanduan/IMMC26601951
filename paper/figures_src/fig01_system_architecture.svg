      <path d="M 144 390 H 618 L 658 509 L 618 628 H 144 Q 126 628 126 610 V 408 Q 126 390 144 390 Z" fill="#26455d" fill-opacity="0.14" stroke="#26455d" stroke-width="2.4"/>
      <text x="152" y="448" font-family="Helvetica Neue, Arial, sans-serif" font-size="34" font-weight="700" fill="#16212a">1. Base-layer parsing</text>
      <text x="152" y="498" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" fill="#5d6872">Ingress map, watch stations, water pull, travel graph</text>
      <text x="152" y="534" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" fill="#5d6872">Outputs: hinge cells, sink cells, and uncertainty stamps</text>
      <rect x="152" y="566" width="422" height="34" rx="17" fill="#26455d" opacity="0.18"/>
      <text x="168" y="589" font-family="Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="700" fill="#26455d">geometry brief</text>
    
      <path d="M 1242 488 C 1270 488, 1296 484, 1318 488" fill="none" stroke="#cbbfa6" stroke-width="10" stroke-linecap="round"/>
      <path d="M 1308 476 L 1332 488 L 1308 500 Z" fill="#cbbfa6"/>
      <path d="M 728 348 H 1202 L 1242 488 L 1202 628 H 728 Q 710 628 710 610 V 366 Q 710 348 728 348 Z" fill="#4f6961" fill-opacity="0.14" stroke="#4f6961" stroke-width="2.4"/>
      <text x="736" y="406" font-family="Helvetica Neue, Arial, sans-serif" font-size="34" font-weight="700" fill="#16212a">2. Debt-field assembly</text>
      <text x="736" y="456" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" fill="#5d6872">Biological consequence, flow centrality, and service slack</text>
      <text x="736" y="492" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" fill="#5d6872">Outputs: hinge belt, debt ladder, and breach-facing cells</text>
      <rect x="736" y="566" width="422" height="34" rx="17" fill="#4f6961" opacity="0.18"/>
      <text x="752" y="589" font-family="Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="700" fill="#4f6961">debt brief</text>
    
      <path d="M 1826 509 C 1854 509, 1880 505, 1902 509" fill="none" stroke="#cbbfa6" stroke-width="10" stroke-linecap="round"/>
      <path d="M 1892 497 L 1916 509 L 1892 521 Z" fill="#cbbfa6"/>
      <path d="M 1312 390 H 1786 L 1826 509 L 1786 628 H 1312 Q 1294 628 1294 610 V 408 Q 1294 390 1312 390 Z" fill="#a9782e" fill-opacity="0.14" stroke="#a9782e" stroke-width="2.4"/>
      <text x="1320" y="448" font-family="Helvetica Neue, Arial, sans-serif" font-size="34" font-weight="700" fill="#16212a">3. Barrier ledger</text>
      <text x="1320" y="498" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" fill="#5d6872">Sweep paths, sentinel anchors, reserve windows, field limits</text>
      <text x="1320" y="534" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" fill="#5d6872">Outputs: weekly barrier deck and reserve covenant</text>
      <rect x="1320" y="566" width="422" height="34" rx="17" fill="#a9782e" opacity="0.18"/>
      <text x="1336" y="589" font-family="Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="700" fill="#a9782e">barrier brief</text>
    
      <path d="M 2410 488 C 2438 488, 2464 484, 2486 488" fill="none" stroke="#cbbfa6" stroke-width="10" stroke-linecap="round"/>
      <path d="M 2476 476 L 2500 488 L 2476 500 Z" fill="#cbbfa6"/>
