    <text x="2956" y="108" font-family="Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="1.8" fill="#16212a">FIG. 01</text>
  
  <text x="92" y="152" font-family="Helvetica Neue, Arial, sans-serif" font-size="58" font-weight="700" fill="#fcfaf6">Etosha Ecological-Liability Contract</text>
  <text x="92" y="188" font-family="Helvetica Neue, Arial, sans-serif" font-size="25" fill="#d7dde0">Liability diagnosis, portfolio design, and workload guarantees are linked in one operating loop</text>
  <rect x="92" y="106" width="941.1200000000001" height="6" rx="3" fill="#26455d"/><rect x="1088.48" y="106" width="442.88" height="6" rx="3" fill="#d5c8ae"/><rect x="1586.72" y="106" width="775.0400000000001" height="6" rx="3" fill="#8796a2" opacity="0.55"/><rect x="92" y="118" width="2103.68" height="2" rx="1" fill="#c5beb1"/>
  
