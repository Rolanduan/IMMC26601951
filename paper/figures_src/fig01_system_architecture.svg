<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3200 2150" width="3200" height="2150">
  <defs>
    <linearGradient id="paperBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf7f0"/>
      <stop offset="100%" stop-color="#f1ece1"/>
    </linearGradient>
    <linearGradient id="headerRule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3f678e"/>
      <stop offset="35%" stop-color="#5f805d"/>
      <stop offset="68%" stop-color="#b77735"/>
      <stop offset="100%" stop-color="#9f473b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#a6afb7" flood-opacity="0.20"/>
    </filter>
    <clipPath id="parkClip" clipPathUnits="userSpaceOnUse">
      <path d="M 285 500 L 530 420 L 1090 400 L 1670 410 L 2270 437 L 2800 469 L 2982 545 L 3000 795 L 2970 1185 L 2830 1350 L 2320 1389 L 1500 1415 L 830 1403 L 428 1337 L 290 1130 L 255 775 Z"/>
    </clipPath>
  </defs>
  <rect x="0" y="0" width="3200" height="2150" fill="url(#paperBg)"/>
  <rect x="68" y="54" width="3064" height="144" rx="28" fill="#ffffff" stroke="#cfd6dc" stroke-width="2" filter="url(#shadow)"/>
  <rect x="98" y="86" width="3004" height="10" rx="5" fill="url(#headerRule)"/>
  <rect x="2942" y="104" width="162" height="48" rx="24" fill="#ece1c5" stroke="#ece1c5" stroke-width="1.5"/>
    <text x="3023" y="136" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" font-weight="700" fill="#243240">FIG. 01</text>
  <text x="104" y="145" font-family="Helvetica Neue, Arial, sans-serif" font-size="56" font-weight="700" fill="#243240">Layered Conservation Decision Architecture</text>
  <text x="104" y="184" font-family="Helvetica Neue, Arial, sans-serif" font-size="28" fill="#6a7682">Layered command logic from GIS diagnosis to field governance</text>
  
    <rect x="150" y="255" width="2900" height="1780" rx="32" fill="#ffffff" stroke="#cfd6dc" stroke-width="2.4" filter="url(#shadow)"/>
    
    <rect x="220" y="320" width="2760" height="248" rx="28" fill="#e8eef6" stroke="#cfd6dc" stroke-width="2"/>
    <text x="260" y="376" font-family="Helvetica Neue, Arial, sans-serif" font-size="38" font-weight="700" fill="#243240">Layer 1: GIS Foundation</text>
    
      <rect x="350" y="402" width="620" height="104" rx="18" fill="#ffffff" stroke="#cfd6dc" stroke-width="2"/>
      <text x="660" y="448" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="31" font-weight="700" fill="#243240">Atlas zoning</text>
      <text x="660" y="488" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#6a7682">vector park base + 8x8 command grid</text>
    
      <rect x="1190" y="402" width="620" height="104" rx="18" fill="#ffffff" stroke="#cfd6dc" stroke-width="2"/>
      <text x="1500" y="448" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="31" font-weight="700" fill="#243240">Feature engineering</text>
      <text x="1500" y="488" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#6a7682">water, access, threat, travel proxies</text>
    
      <rect x="2030" y="402" width="620" height="104" rx="18" fill="#ffffff" stroke="#cfd6dc" stroke-width="2"/>
      <text x="2340" y="448" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="31" font-weight="700" fill="#243240">Uncertainty tags</text>
      <text x="2340" y="488" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#6a7682">season drift and data confidence</text>
    
    <text x="260" y="540" font-family="Helvetica Neue, Arial, sans-serif" font-size="26" fill="#6a7682">Output: harmonized planning cells with interpretable spatial attributes</text>
  
    
    <rect x="220" y="615" width="2760" height="248" rx="28" fill="#e6efe3" stroke="#cfd6dc" stroke-width="2"/>
    <text x="260" y="671" font-family="Helvetica Neue, Arial, sans-serif" font-size="38" font-weight="700" fill="#243240">Layer 2: Spatial Risk Inference</text>
    
      <rect x="350" y="697" width="620" height="104" rx="18" fill="#ffffff" stroke="#cfd6dc" stroke-width="2"/>
      <text x="660" y="743" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="31" font-weight="700" fill="#243240">Ecological value</text>
      <text x="660" y="783" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#6a7682">wildlife and water dependence</text>
    
      <rect x="1190" y="697" width="620" height="104" rx="18" fill="#ffffff" stroke="#cfd6dc" stroke-width="2"/>
      <text x="1500" y="743" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="31" font-weight="700" fill="#243240">Threat opportunity</text>
      <text x="1500" y="783" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#6a7682">road-linked poaching exposure</text>
    
      <rect x="2030" y="697" width="620" height="104" rx="18" fill="#ffffff" stroke="#cfd6dc" stroke-width="2"/>
      <text x="2340" y="743" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="31" font-weight="700" fill="#243240">Delay penalty</text>
      <text x="2340" y="783" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#6a7682">response feasibility by station</text>
    
    <text x="260" y="835" font-family="Helvetica Neue, Arial, sans-serif" font-size="26" fill="#6a7682">Output: hotspot quartiles, dominant drivers, and map-based priority surfaces</text>
  
    
    <rect x="220" y="910" width="2760" height="248" rx="28" fill="#f3ead8" stroke="#cfd6dc" stroke-width="2"/>
    <text x="260" y="966" font-family="Helvetica Neue, Arial, sans-serif" font-size="38" font-weight="700" fill="#243240">Layer 3: Allocation and Scheduling</text>
    
      <rect x="350" y="992" width="620" height="104" rx="18" fill="#ffffff" stroke="#cfd6dc" stroke-width="2"/>
      <text x="660" y="1038" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="31" font-weight="700" fill="#243240">Route library</text>
      <text x="660" y="1078" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#6a7682">patrol loops from camps and roads</text>
    
      <rect x="1190" y="992" width="620" height="104" rx="18" fill="#ffffff" stroke="#cfd6dc" stroke-width="2"/>
      <text x="1500" y="1038" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="31" font-weight="700" fill="#243240">Mixed assets</text>
      <text x="1500" y="1078" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#6a7682">fixed sensors + drone windows</text>
    
      <rect x="2030" y="992" width="620" height="104" rx="18" fill="#ffffff" stroke="#cfd6dc" stroke-width="2"/>
      <text x="2340" y="1038" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="31" font-weight="700" fill="#243240">Feasibility screen</text>
      <text x="2340" y="1078" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#6a7682">hours, shifts, and revisit constraints</text>
    
    <text x="260" y="1130" font-family="Helvetica Neue, Arial, sans-serif" font-size="26" fill="#6a7682">Output: deployable patrol portfolio and command schedule</text>
  
    
    <rect x="220" y="1205" width="2760" height="248" rx="28" fill="#f0e4e1" stroke="#cfd6dc" stroke-width="2"/>
    <text x="260" y="1261" font-family="Helvetica Neue, Arial, sans-serif" font-size="38" font-weight="700" fill="#243240">Layer 4: Dynamic Evaluation</text>
    
      <rect x="350" y="1287" width="620" height="104" rx="18" fill="#ffffff" stroke="#cfd6dc" stroke-width="2"/>
      <text x="660" y="1333" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="31" font-weight="700" fill="#243240">Monte Carlo pressure</text>
      <text x="660" y="1373" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#6a7682">illegal entries over 30 days</text>
    
      <rect x="1190" y="1287" width="620" height="104" rx="18" fill="#ffffff" stroke="#cfd6dc" stroke-width="2"/>
      <text x="1500" y="1333" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="31" font-weight="700" fill="#243240">Detection and dispatch</text>
      <text x="1500" y="1373" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#6a7682">signal to interception chain</text>
    
      <rect x="2030" y="1287" width="620" height="104" rx="18" fill="#ffffff" stroke="#cfd6dc" stroke-width="2"/>
      <text x="2340" y="1333" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="31" font-weight="700" fill="#243240">Staffing floor</text>
      <text x="2340" y="1373" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#6a7682">safe operating threshold</text>
    
    <text x="260" y="1425" font-family="Helvetica Neue, Arial, sans-serif" font-size="26" fill="#6a7682">Output: PI trajectories, robustness bands, and minimum ranger requirement</text>
  
    
    <rect x="220" y="1500" width="2760" height="248" rx="28" fill="#ebe6f3" stroke="#cfd6dc" stroke-width="2"/>
    <text x="260" y="1556" font-family="Helvetica Neue, Arial, sans-serif" font-size="38" font-weight="700" fill="#243240">Layer 5: Transfer and Governance</text>
    
      <rect x="350" y="1582" width="620" height="104" rx="18" fill="#ffffff" stroke="#cfd6dc" stroke-width="2"/>
      <text x="660" y="1628" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="31" font-weight="700" fill="#243240">Weekly command packet</text>
      <text x="660" y="1668" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#6a7682">maps, routes, and exceptions</text>
    
      <rect x="1190" y="1582" width="620" height="104" rx="18" fill="#ffffff" stroke="#cfd6dc" stroke-width="2"/>
      <text x="1500" y="1628" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="31" font-weight="700" fill="#243240">Cross-park matrix</text>
      <text x="1500" y="1668" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#6a7682">portable core versus local retuning</text>
    
      <rect x="2030" y="1582" width="620" height="104" rx="18" fill="#ffffff" stroke="#cfd6dc" stroke-width="2"/>
      <text x="2340" y="1628" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="31" font-weight="700" fill="#243240">Review cycle</text>
      <text x="2340" y="1668" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#6a7682">feedback to the GIS prior layer</text>
    
    <text x="260" y="1720" font-family="Helvetica Neue, Arial, sans-serif" font-size="26" fill="#6a7682">Output: executable management package and transfer rules</text>
  
    <path d="M 1600 568 L 1600 610 M 1600 863 L 1600 905 M 1600 1158 L 1600 1200 M 1600 1453 L 1600 1495" stroke="#243240" stroke-width="6" stroke-linecap="round"/>
    <path d="M 1600 605 L 1588 587 L 1612 587 Z M 1600 900 L 1588 882 L 1612 882 Z M 1600 1195 L 1588 1177 L 1612 1177 Z M 1600 1490 L 1588 1472 L 1612 1472 Z" fill="#243240"/>
    <path d="M 2880 1620 C 2950 1620 3000 1380 3000 1110" fill="none" stroke="#6a7682" stroke-width="4" stroke-dasharray="14 12"/>
    <path d="M 3000 1110 L 2980 1124 L 2986 1098 Z" fill="#6a7682"/>
    <text x="3020" y="1380" transform="rotate(90 3020 1380)" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#6a7682">rolling feedback and recalibration</text>
    <rect x="232" y="1788" width="980" height="170" rx="22" fill="#f8f6ef" stroke="#cfd6dc" stroke-width="2.2" filter="url(#shadow)"/><text x="266" y="1844" font-family="Helvetica Neue, Arial, sans-serif" font-size="30" font-weight="700" fill="#243240">Command logic</text><text x="266" y="1896" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#6a7682">Each layer adds one management decision before handing outputs downward</text><text x="266" y="1930" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#6a7682">Maps, schedules, staffing, and transfer rules remain inside one framework</text>
    <rect x="1320" y="1788" width="780" height="170" rx="22" fill="#f8f6ef" stroke="#cfd6dc" stroke-width="2.2" filter="url(#shadow)"/><text x="1354" y="1844" font-family="Helvetica Neue, Arial, sans-serif" font-size="30" font-weight="700" fill="#243240">Decision Rule</text><text x="1354" y="1896" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#6a7682">Protect decisive corridors, not the whole park uniformly</text><text x="1354" y="1930" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#6a7682">Keep GIS diagnosis, allocation, and simulation in one loop</text>
    <rect x="2140" y="1788" width="820" height="170" rx="22" fill="#f8f6ef" stroke="#cfd6dc" stroke-width="2.2" filter="url(#shadow)"/><text x="2174" y="1844" font-family="Helvetica Neue, Arial, sans-serif" font-size="30" font-weight="700" fill="#243240">Deliverables</text><text x="2174" y="1896" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#6a7682">hotspot atlas, route plan, staffing floor, and transfer matrix</text><text x="2174" y="1930" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#6a7682">all tied back to the same command architecture</text>
  
</svg>