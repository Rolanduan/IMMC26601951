    <text x="122" y="108" font-family="Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="1.8" fill="#26455d">LIABILITY CONTRACT</text>
  
  
    <rect x="2926" y="82" width="162" height="38" rx="10" fill="#f2ecdf" stroke="#16212a" stroke-opacity="0.15" stroke-width="1.2"/>
