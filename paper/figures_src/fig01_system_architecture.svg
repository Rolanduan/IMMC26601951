    <rect x="180" y="1098" width="272" height="30" rx="8" fill="#26455d" fill-opacity="0.12"/>
    <text x="192" y="1134" font-family="Helvetica Neue, Arial, sans-serif" font-size="34" font-weight="700" fill="#16212a">Hard design rules</text>
    <text x="192" y="1178" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#5d6872">Seal high-debt hinge arcs before spending effort on diffuse background coverage.</text><text x="192" y="1212" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#5d6872">Admit only plans that satisfy field hours, path length, and reserve capacity.</text><text x="192" y="1246" font-family="Helvetica Neue, Arial, sans-serif" font-size="24" fill="#5d6872">Allow each week's observations to rewrite the next state rather than freeze one static package.</text>
  
