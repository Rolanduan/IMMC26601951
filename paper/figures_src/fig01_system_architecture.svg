      <text x="1904" y="406" font-family="Helvetica Neue, Arial, sans-serif" font-size="34" font-weight="700" fill="#16212a">4. Reliability stress</text>
      <text x="1904" y="456" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" fill="#5d6872">Threat arrivals, queueing delay, and interception decay</text>
      <text x="1904" y="492" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" fill="#5d6872">Outputs: PI trace, tail exposure, and staffing floor</text>
      <rect x="1904" y="566" width="422" height="34" rx="17" fill="#2f666d" opacity="0.18"/>
      <text x="1920" y="589" font-family="Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="700" fill="#2f666d">stress brief</text>
    
