      <path d="M 2480 390 H 2954 L 2994 509 L 2954 628 H 2480 Q 2462 628 2462 610 V 408 Q 2462 390 2480 390 Z" fill="#67586d" fill-opacity="0.14" stroke="#67586d" stroke-width="2.4"/>
      <text x="2488" y="448" font-family="Helvetica Neue, Arial, sans-serif" font-size="34" font-weight="700" fill="#16212a">5. Revision covenant</text>
      <text x="2488" y="498" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" fill="#5d6872">Audit trail, transfer rules, and next-cycle exceptions</text>
      <text x="2488" y="534" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" fill="#5d6872">Outputs: refreshed state packet for repeat deployment</text>
      <rect x="2488" y="566" width="422" height="34" rx="17" fill="#67586d" opacity="0.18"/>
      <text x="2504" y="589" font-family="Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="700" fill="#67586d">revision brief</text>
