    <text x="2512" y="472" font-family="Helvetica Neue, Arial, sans-serif" font-size="34" font-weight="700" fill="#20303d">How to read the bands</text>
    <text x="2512" y="520" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" fill="#687682">Each diagonal band is an iso-protection zone.</text><text x="2512" y="554" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" fill="#687682">Moving up or right both improve PI, but the blue frontier marks the minimum safe region.</text>
  
    <rect x="2486" y="724" width="478" height="210" rx="24" fill="#ffffff" stroke="#bcc4c5" stroke-width="2" filter="url(#shadow)"/>
    <rect x="2486" y="724" width="478" height="12" rx="24" fill="#405b74" opacity="0.92"/>
    <text x="2512" y="782" font-family="Helvetica Neue, Arial, sans-serif" font-size="34" font-weight="700" fill="#20303d">Management implication</text>
    <text x="2512" y="830" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" fill="#687682">Detection gains can partly offset manpower loss, but only until the frontier is crossed.</text><text x="2512" y="864" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" fill="#687682">The safest operating region stays above and to the right of the line.</text>
  
