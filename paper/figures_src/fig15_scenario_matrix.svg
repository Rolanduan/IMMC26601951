    <text x="2538" y="468" font-family="Helvetica Neue, Arial, sans-serif" font-size="34" font-weight="700" fill="#16212a">How to read the bands</text>
    <text x="2538" y="512" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" fill="#5d6872">Each diagonal band is an iso-protection zone.</text><text x="2538" y="546" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" fill="#5d6872">Moving up or right both improve PI, but the blue frontier marks the minimum safe region.</text>
  
    <rect x="2486" y="724" width="478" height="210" rx="18" fill="#ffffff" stroke="#c5beb1" stroke-width="1.9" filter="url(#shadow)"/>
    <rect x="2502" y="740" width="10" height="178" rx="5" fill="#26455d" opacity="0.9"/>
    <rect x="2526" y="742" width="342" height="30" rx="8" fill="#26455d" fill-opacity="0.12"/>
    <text x="2538" y="778" font-family="Helvetica Neue, Arial, sans-serif" font-size="34" font-weight="700" fill="#16212a">Management implication</text>
    <text x="2538" y="822" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" fill="#5d6872">Detection gains can partly offset manpower loss, but only until the frontier is crossed.</text><text x="2538" y="856" font-family="Helvetica Neue, Arial, sans-serif" font-size="23" fill="#5d6872">The safest operating region stays above and to the right of the line.</text>
  
