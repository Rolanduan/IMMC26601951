  <rect x="2060" y="540" width="720" height="272" rx="16" fill="#ffffff" fill-opacity="0.94" stroke="#d5dee9" stroke-width="1.8" filter="url(#cardShadow)"/><text x="2084" y="582" font-family="Times New Roman, Georgia, serif" font-size="28" font-weight="700" fill="#18324a">Interpretation</text><text x="2084" y="618" font-family="Times New Roman, Georgia, serif" font-size="21" fill="#405d78">The heatmap makes the policy frontier visible.</text><text x="2084" y="646" font-family="Times New Roman, Georgia, serif" font-size="21" fill="#405d78">Stronger detection can offset thinner staffing, but only to a point.</text><text x="2084" y="674" font-family="Times New Roman, Georgia, serif" font-size="21" fill="#405d78">Robust performance appears in the upper-right region.</text><text x="2084" y="702" font-family="Times New Roman, Georgia, serif" font-size="21" fill="#405d78">There, manpower and sensing reinforce each other.</text><text x="2084" y="730" font-family="Times New Roman, Georgia, serif" font-size="21" fill="#405d78">Low detection with thin staffing creates a fragile block.</text><text x="2084" y="758" font-family="Times New Roman, Georgia, serif" font-size="21" fill="#405d78">That justifies contingency triggers in the command packet.</text>
